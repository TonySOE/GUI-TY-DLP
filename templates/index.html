<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT-DLP GUI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <div class="logo">YT-DLP</div>
        <div class="header-actions">
            <button class="btn-update" id="btn-update" onclick="updateTool()">
                <span class="update-icon">↻</span> UPDATE TOOL
            </button>
        </div>
    </header>

    <div class="main-layout">

        <!-- ══════════════════════════════ LEFT: Controls ══════════════════════════════ -->
        <div class="controls-col">

            <!-- URL -->
            <div class="card">
                <div class="card-label">URL</div>
                <div class="card-body">
                    <div class="url-wrap">
                        <input type="url" id="url" placeholder="[URL]">
                        <button class="url-clear" onclick="clearUrl()" title="Clear">×</button>
                    </div>
                </div>
            </div>

            <!-- MEDIA -->
            <div class="card">
                <div class="card-label">MEDIA</div>
                <div class="card-body">

                    <div class="field">
                        <label>Select the media (Only audio / only video / Audio and video)</label>
                        <select id="media_type" onchange="updateMediaOptions()">
                            <option value="audio">Audio</option>
                            <option value="video">Video</option>
                            <option value="both">Audio + Video</option>
                        </select>
                    </div>

                    <div class="media-grid">
                        <div class="field" id="audio-format-field">
                            <label>Select format (in case it's just audio or audio and video: mp3, wav, opus, m4a, etc.)</label>
                            <select id="audio_format">
                                <option value="mp3">mp3</option>
                                <option value="opus">opus</option>
                                <option value="m4a">m4a</option>
                                <option value="flac">flac</option>
                                <option value="wav">wav</option>
                            </select>
                        </div>
                        <div class="field" id="audio-quality-field">
                            <label>Select audio quality (the best - 0, alta - 2, media - 5, baja - 9)</label>
                            <select id="audio_quality">
                                <option value="0">The best (0)</option>
                                <option value="2">Alta (2)</option>
                                <option value="5">Media (5)</option>
                                <option value="9">Baja (9)</option>
                            </select>
                        </div>
                        <div class="field" id="video-format-field">
                            <label>Select format (in case it's just video or audio and video: mp4, mkv, etc.)</label>
                            <select id="video_format">
                                <option value="mp4">mp4</option>
                                <option value="mkv">mkv</option>
                                <option value="webm">webm</option>
                            </select>
                        </div>
                        <div class="field" id="video-quality-field">
                            <label>Select resolution (best posible, HD, FHD, 480p, 360p)</label>
                            <select id="video_quality">
                                <option value="best">Best possible</option>
                                <option value="2160">4K (2160p)</option>
                                <option value="1080" selected>FHD (1080p)</option>
                                <option value="720">HD (720p)</option>
                                <option value="480">480p</option>
                                <option value="360">360p</option>
                            </select>
                        </div>
                    </div>

                    <div class="field" id="video-codec-field">
                        <label>Select video codec (AV1 - av01, VP9, AVC/h264 - avc1)</label>
                        <select id="video_codec">
                            <option value="av1">AV1 — Efficient: Best quality, less storage, more HW</option>
                            <option value="vp9">VP9 — High quality, Google codec, superior detail</option>
                            <option value="h264">AVC/h264 — Best compatibility, older devices</option>
                            <option value="any">Any — Auto select best available</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- CONTENT -->
            <div class="card">
                <div class="card-label">CONTENT</div>
                <div class="card-body">

                    <div class="check-grid-4">

                        <label class="check-card active" id="chk-meta">
                            <input type="checkbox" id="embed_metadata" checked>
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Metadata</span>
                                <span class="chk-desc">Author, title song, etc.</span>
                            </div>
                        </label>

                        <label class="check-card" id="chk-playlist">
                            <input type="checkbox" id="is_playlist">
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Playlist</span>
                                <span class="chk-desc">Select if link is a playlist</span>
                            </div>
                        </label>

                        <label class="check-card" id="chk-archive">
                            <input type="checkbox" id="use_archive" onchange="toggleArchive(this)">
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Use register (.txt)</span>
                                <span class="chk-desc">To keep history of the already downloaded</span>
                            </div>
                        </label>

                        <label class="check-card" id="chk-index">
                            <input type="checkbox" id="number_playlist">
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Numeric list</span>
                                <span class="chk-desc">(01 -, 02 -, ...)</span>
                            </div>
                        </label>

                        <label class="check-card active" id="chk-thumb">
                            <input type="checkbox" id="embed_thumbnail" checked>
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Thumbnail</span>
                                <span class="chk-desc">Author, title song, etc.</span>
                            </div>
                        </label>

                        <label class="check-card active" id="chk-subs">
                            <input type="checkbox" id="write_subs" checked>
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Subtitles</span>
                                <span class="chk-desc">Author, title song, etc.</span>
                            </div>
                        </label>

                        <label class="check-card active" id="chk-autosubs">
                            <input type="checkbox" id="write_auto_subs" checked>
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Auto-subs</span>
                                <span class="chk-desc">Auto-generated subtitles</span>
                            </div>
                        </label>

                        <label class="check-card active" id="chk-embedsubs">
                            <input type="checkbox" id="embed_subs" checked>
                            <div class="chk-icon-wrap">
                                <svg class="chk-svg" viewBox="0 0 10 10">
                                    <polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="chk-info">
                                <span class="chk-name">Embed subs</span>
                                <span class="chk-desc">Embed into media file</span>
                            </div>
                        </label>

                    </div>

                    <!-- Subtitle languages -->
                    <div class="field" id="subs-langs-field">
                        <label>Subtitle languages</label>
                        <input type="text" id="sub_langs" value="es.*,en.*" placeholder="es.*,en.*">
                    </div>

                    <!-- Archive path -->
                    <div class="field" id="archive-field" style="display:none;">
                        <label>Register file path (.txt)</label>
                        <input type="text" id="archive_file" placeholder="archive.txt">
                    </div>

                </div>
            </div>

            <!-- OUTPUT -->
            <div class="card">
                <div class="card-label">OUTPUT</div>
                <div class="card-body">
                    <div class="folder-wrap">
                        <button class="btn-browse-folder" onclick="browseFolder()">
                            📁 Select path to download
                        </button>
                        <input type="text" id="output_dir" placeholder="Default: Downloads folder">
                    </div>
                </div>
            </div>

        </div><!-- /controls-col -->

        <!-- ══════════════════════════════ SPLITTER ══════════════════════════════ -->
        <div class="splitter" id="splitter"></div>

        <!-- ══════════════════════════════ RIGHT: Console ══════════════════════════════ -->
        <div class="console-col">

            <div class="console-header">
                <div class="console-title">
                    <div class="status-dot" id="status-dot"></div>
                    CONSOLE <span class="console-sub">(output)</span>
                </div>
                <button class="btn-clear-log" onclick="clearLog()">clear</button>
            </div>

            <div class="progress-wrap" id="progress-section">
                <div class="prog-bar-track">
                    <div class="prog-bar" id="progress-bar"></div>
                </div>
                <div class="prog-details">
                    <span class="prog-filename" id="prog-filename">—</span>
                    <div class="prog-stats">
                        <span>vel: <strong id="prog-speed">—</strong></span>
                        <span>eta: <strong id="prog-eta">—</strong></span>
                        <span class="prog-pct" id="prog-percent">0%</span>
                    </div>
                </div>
            </div>

            <div class="log" id="log">
                <div class="log-empty">
                    <span class="log-arrow">←</span>
                    Configure and press <strong>DOWNLOAD</strong>
                </div>
            </div>

            <div class="console-footer">
                <button class="btn-stop" id="btn-stop" onclick="stopDownload()">■ STOP</button>
                <button class="btn-download" id="btn-download" onclick="startDownload()">⬇ DOWNLOAD</button>
            </div>

        </div><!-- /console-col -->

    </div><!-- /main-layout -->

    <div class="app-bar">
        <label class="app-tab active">GUI Prototype</label>
    </div>

    <script src="script.js"></script>
</body>

</html>
